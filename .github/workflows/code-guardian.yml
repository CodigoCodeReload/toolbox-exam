name: Code Guardian

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Run Code Guardian validation
        run: |
          curl -sS -X POST "https://dev.codigocode.ai/code-guardian/validate/ci" \
            -H "X-Code-Guardian-Api-Key: ${{ secrets.CODE_GUARDIAN_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "git": {
                "provider": "github",
                "auth_type": "oauth",
                "use_saved_token": true,
                "owner": "${{ github.repository_owner }}",
                "repo": "${{ github.event.repository.name }}",
                "branch": "${{ github.head_ref || github.ref_name }}",
                "base_branch": "${{ github.event.repository.default_branch }}"
              },
              "pr_number": ${{ github.event.pull_request.number || 'null' }},
              "bypass_jira": true,
              "run_playbook": true,
              "run_sonarqube": true,
              "sonarqube_project_key": "testbbva",
              "run_vulnerability": true
            }'
